name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Disable FIPS (fix electron-builder hash on CI)
        run: Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\FIPSAlgorithmPolicy" -Name "Enabled" -Value 0

      - name: Typecheck
        run: npm run typecheck

      - name: Build & Package
        run: npm run dist 2>&1 | Tee-Object -FilePath build-output.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder
        continue-on-error: true

      - name: Upload build log (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log

      - name: Fail if build failed
        if: failure()
        run: exit 1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelPomodoro-Setup
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
